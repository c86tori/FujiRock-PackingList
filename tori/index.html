<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>フジロック持ち物リスト（tori）</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192x192.png">
    <meta name="theme-color" content="#E64219"/>
</head>
<body>
    <header class="app-header">
        <div class="brand">
            <h1 id="app-title">フジロック持ち物リスト</h1>
        </div>
        <div class="header-side">
            <div id="ring-slot" class="ring-slot"></div>
            <button id="edit-toggle" class="edit-toggle" type="button" aria-label="編集">✎</button>
        </div>
    </header>

    <div class="subbar">
        <p id="progress-label" class="progress-label"></p>
        <p class="hint" id="hint">
            <span class="hint-grip" aria-hidden="true"></span>
            つまんでドラッグで並べ替え・タップでチェック
        </p>
        <p id="edit-help" class="hint edit-help" hidden>
            編集モード：文字をタップで書き換え・＋で追加・🗑で削除・ドラッグで並べ替え
        </p>
    </div>

    <main id="app"></main>

    <div id="confetti" class="confetti" aria-hidden="true"></div>

    <script src="app.js"></script>
</body>
</html>
